# Etalon Nomenclature Service Configuration
# Copy this file to config.yaml and fill in your actual values

# How often to check for new emails
poll_interval: 1m

# Database configuration
database:
  # PostgreSQL connection string
  # Format: postgresql://user:password@host:port/database?sslmode=require
  # NOTE: If password contains special characters (< > ; : @ / ? # &), URL-encode them:
  #   < = %3C, > = %3E, ; = %3B, : = %3A, @ = %40, etc.
  dsn: "postgresql://db_user:your_password_here@your_db_host:5432/your_database?sslmode=require"

  # Path to SSL root certificate (if using verify-full)
  ssl_root_cert: "/app/certs/root.crt"

  # Connection pool settings (optional)
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

# Email mailboxes to monitor
mailboxes:
  # Main mailbox for receiving price lists
  - email: "zakupki@your-domain.ru"
    password: "your_email_password"
    host: "mail.hosting.reg.ru"
    port: 993

  # You can add multiple mailboxes
  # - email: "sales@your-domain.ru"
  #   password: "another_password"
  #   host: "mail.hosting.reg.ru"
  #   port: 993

# Email filtering (optional)
# Only process emails from these senders
# Uncomment and modify as needed
# allowed_senders:
#   - "pna@sibzapaska.ru"
#   - "sales@supplier.com"
