services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: etalon-nomenclature
    restart: unless-stopped

    environment:
      # Database configuration - Option 1: Use separate variables (recommended for passwords with special chars)
      # These variables must be set in .env file in the same directory as docker-compose.yml
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-}
      - DB_SSLMODE=${DB_SSLMODE:-require}

      # Database configuration - Option 2: Use full DSN (if DB_* vars not set)
      - DATABASE_DSN=${DATABASE_DSN:-}
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-25}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-5}
      - DATABASE_CONN_MAX_LIFETIME=${DATABASE_CONN_MAX_LIFETIME:-5m}

      # SSL Certificate (base64 encoded, optional)
      - PGSSLROOTCERT_BASE64=${PGSSLROOTCERT_BASE64:-}

      # Email configuration (JSON array)
      - MAILBOXES_JSON=${MAILBOXES_JSON}

      # Email filtering (comma-separated list of allowed senders)
      - ALLOWED_SENDERS=${ALLOWED_SENDERS}

      # Poll interval
      - POLL_INTERVAL=${POLL_INTERVAL:-1m}

      # Set timezone
      - TZ=Europe/Moscow

    # Health check (optional)
    healthcheck:
      test: ["CMD", "pgrep", "-f", "/app/app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network mode
    network_mode: bridge
